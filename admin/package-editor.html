<!DOCTYPE html>
<html>
<head>
    <title>M3U Playlist Editor</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .category { margin: 5px 0; padding: 8px; background: #e8e8e8; border-radius: 5px; cursor: pointer; }
        .category:hover { background: #d0d0d0; }
        .category label { font-weight: bold; cursor: pointer; display: block; }
        .channels { margin-left: 30px; margin-top: 5px; display: none; max-height: 200px; overflow-y: auto; font-size: 11px; }
        .channel { margin: 2px 0; color: #555; white-space: nowrap; overflow-x: hidden; text-overflow: ellipsis; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px; }
        button:hover { background: #0056b3; }
        .stats { margin: 10px 0; padding: 10px; background: #d4edda; border-radius: 5px; font-weight: bold; }
        .warning { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .search-box { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .category-count { float: right; font-size: 12px; color: #666; }
        .select-all { background: #28a745; }
        .deselect-all { background: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 Package Editor for: <span id="username"></span></h1>
    <div id="loadingMsg" class="warning">Loading playlist from server...</div>
    <div id="editor" style="display:none;">
        <div class="stats" id="stats"></div>
        <input type="text" id="searchBox" class="search-box" placeholder="🔍 Search categories..." onkeyup="filterCategories()">
        <div>
            <button class="select-all" onclick="selectAll()">✅ Select All Categories</button>
            <button class="deselect-all" onclick="deselectAll()">❌ Deselect All Categories</button>
            <button onclick="expandAll()">📂 Expand All</button>
            <button onclick="collapseAll()">📁 Collapse All</button>
        </div>
        <div id="categories" style="max-height: 500px; overflow-y: auto;"></div>
        <div>
            <button onclick="savePackage()">💾 Save Package for User</button>
            <button onclick="window.close()">Close</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const userName = urlParams.get('username');
    document.getElementById('username').innerText = userName;
    
    let categories = {};
    let selectedChannels = new Set();
    
    async function loadM3U() {
        try {
            const response = await fetch('/final.m3u');
            const text = await response.text();
            parseM3U(text);
            await loadUserChannels();
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
        } catch(e) {
            document.getElementById('loadingMsg').innerHTML = 'Error loading file: ' + e.message;
        }
    }
    
    async function loadUserChannels() {
        const res = await fetch(`/api/user-channels?user_id=${userId}`);
        const data = await res.json();
        if (data.success && data.channels) {
            data.channels.forEach(url => selectedChannels.add(url));
        }
    }
    
    function parseM3U(data) {
        const lines = data.split('\n');
        let currentCategory = 'Uncategorized';
        let currentExtinf = '';
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                currentExtinf = line;
                const match = line.match(/group-title="([^"]+)"/);
                currentCategory = match ? match[1] : 'Uncategorized';
                if (!categories[currentCategory]) {
                    categories[currentCategory] = { channels: [], selected: true, expanded: false };
                }
            } else if (line.startsWith('http') && currentExtinf) {
                const nameMatch = currentExtinf.match(/,(.+)$/);
                const channelName = nameMatch ? nameMatch[1] : 'Unknown';
                categories[currentCategory].channels.push({
                    extinf: currentExtinf,
                    url: line,
                    name: channelName
                });
                currentExtinf = '';
            }
        }
        displayCategories();
        updateStats();
    }
    
    function displayCategories() {
        const container = document.getElementById('categories');
        container.innerHTML = '';
        const searchTerm = document.getElementById('searchBox').value.toLowerCase();
        const sortedCategories = Object.keys(categories).sort();
        
        for (const catName of sortedCategories) {
            if (searchTerm && !catName.toLowerCase().includes(searchTerm)) continue;
            const catData = categories[catName];
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            const allSelected = catData.channels.every(ch => selectedChannels.has(ch.url));
            
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            catDiv.innerHTML = `
                <label onclick="event.stopPropagation(); toggleCategory('${catName.replace(/'/g, "\\'")}')">
                    <input type="checkbox" id="${safeId}" ${allSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleCategoryCheckbox('${catName.replace(/'/g, "\\'")}')"> 
                    <strong>📁 ${catName}</strong>
                    <span class="category-count">(${catData.channels.length} channels)</span>
                </label>
                <div class="channels" id="channels_${safeId}" style="display: ${catData.expanded ? 'block' : 'none'}">
                    ${catData.channels.map(ch => {
                        const isChecked = selectedChannels.has(ch.url);
                        return `<div class="channel"><input type="checkbox" class="channel-cb" data-url="${ch.url}" data-cat="${catName}" onchange="updateChannelSelection('${catName}')" ${isChecked ? 'checked' : ''}> ▶ ${ch.name.substring(0, 80)}</div>`;
                    }).join('')}
                </div>
            `;
            container.appendChild(catDiv);
        }
        updateStats();
    }
    
    function toggleCategoryCheckbox(catName) {
        const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
        const checkbox = document.getElementById(safeId);
        const catData = categories[catName];
        catData.channels.forEach(ch => {
            if (checkbox.checked) {
                selectedChannels.add(ch.url);
            } else {
                selectedChannels.delete(ch.url);
            }
        });
        updateStats();
        displayCategories();
    }
    
    function updateChannelSelection(catName) {
        const catData = categories[catName];
        const allSelected = catData.channels.every(ch => selectedChannels.has(ch.url));
        const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
        const catCheckbox = document.getElementById(safeId);
        if (catCheckbox) catCheckbox.checked = allSelected;
        
        // Update selectedChannels based on current checkboxes
        document.querySelectorAll('.channel-cb:checked').forEach(cb => {
            selectedChannels.add(cb.getAttribute('data-url'));
        });
        document.querySelectorAll('.channel-cb:not(:checked)').forEach(cb => {
            selectedChannels.delete(cb.getAttribute('data-url'));
        });
        updateStats();
    }
    
    function toggleCategory(catName) {
        const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
        const channelsDiv = document.getElementById('channels_' + safeId);
        if (channelsDiv) {
            categories[catName].expanded = !categories[catName].expanded;
            channelsDiv.style.display = categories[catName].expanded ? 'block' : 'none';
        }
    }
    
    function updateStats() {
        let total = 0, selected = 0;
        for (const cat of Object.values(categories)) {
            total += cat.channels.length;
            for (const ch of cat.channels) {
                if (selectedChannels.has(ch.url)) selected++;
            }
        }
        document.getElementById('stats').innerHTML = `📊 Total channels: ${total.toLocaleString()} | ✅ Selected: ${selected.toLocaleString()}`;
    }
    
    function selectAll() {
        for (const cat of Object.values(categories)) {
            cat.channels.forEach(ch => selectedChannels.add(ch.url));
        }
        updateStats();
        displayCategories();
    }
    
    function deselectAll() {
        selectedChannels.clear();
        updateStats();
        displayCategories();
    }
    
    function expandAll() {
        for (const catName of Object.keys(categories)) {
            categories[catName].expanded = true;
        }
        displayCategories();
    }
    
    function collapseAll() {
        for (const catName of Object.keys(categories)) {
            categories[catName].expanded = false;
        }
        displayCategories();
    }
    
    function filterCategories() {
        displayCategories();
    }
    
    async function savePackage() {
        const selectedUrls = Array.from(selectedChannels);
        const res = await fetch(`/api/user?id=${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channels: selectedUrls })
        });
        const data = await res.json();
        if (data.success) {
            alert(`Package saved with ${selectedUrls.length} channels!`);
            window.close();
        } else {
            alert('Failed to save');
        }
    }
    
    loadM3U();
</script>
</body>
</html>
