<!DOCTYPE html>
<html>
<head>
    <title>Test Edit Button</title>
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; max-width: 500px; margin: auto; }
    </style>
</head>
<body>
    <button onclick="testFunction()">Test Alert</button>
    <div id="testModal" class="modal">
        <div class="modal-content">
            <h3>Modal Works!</h3>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <script>
        function testFunction() {
            alert("Button clicked! Modal should open.");
            document.getElementById('testModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('testModal').style.display = 'none';
        }
    </script>
</body>
</html>
