<!DOCTYPE html>
<html>
<head>
    <title>M3U Playlist Editor - IPTV Package Creator</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .category { margin: 5px 0; padding: 8px; background: #e8e8e8; border-radius: 5px; cursor: pointer; }
        .category:hover { background: #d0d0d0; }
        .category label { font-weight: bold; cursor: pointer; display: block; }
        .channels { margin-left: 30px; margin-top: 5px; display: none; max-height: 200px; overflow-y: auto; font-size: 11px; }
        .channel { margin: 2px 0; color: #555; white-space: nowrap; overflow-x: hidden; text-overflow: ellipsis; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 5px; }
        button:hover { background: #0056b3; }
        .stats { margin: 10px 0; padding: 10px; background: #d4edda; border-radius: 5px; font-weight: bold; }
        input[type="file"] { padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; width: 100%; }
        .progress { background: #e0e0e0; border-radius: 5px; margin: 10px 0; display: none; }
        .progress-bar { background: #007bff; color: white; padding: 5px; text-align: center; border-radius: 5px; width: 0%; }
        .select-all { background: #28a745; }
        .select-all:hover { background: #1e7e34; }
        .deselect-all { background: #dc3545; }
        .deselect-all:hover { background: #bd2130; }
        .warning { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .search-box { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        .category-count { float: right; font-size: 12px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 IPTV Package Creator</h1>
    
    <div class="warning">
        ⚠️ Load the final.m3u file from the server to create packages for users.
    </div>
    
    <div>
        <h3>Step 1: Load M3U File</h3>
        <input type="file" id="fileInput" accept=".m3u,.txt" onchange="processFile()">
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar">Loading...</div>
        </div>
    </div>
    
    <div id="editor" style="display:none;">
        <div class="stats" id="stats"></div>
        <div>
            <input type="text" id="searchBox" class="search-box" placeholder="🔍 Search categories..." onkeyup="filterCategories()">
        </div>
        <div style="margin: 10px 0;">
            <button class="select-all" onclick="selectAll()">✅ Select All Categories</button>
            <button class="deselect-all" onclick="deselectAll()">❌ Deselect All Categories</button>
            <button onclick="expandAll()">📂 Expand All</button>
            <button onclick="collapseAll()">📁 Collapse All</button>
        </div>
        <div id="categories" style="max-height: 500px; overflow-y: auto;"></div>
        <div style="margin-top: 20px;">
            <button onclick="downloadFiltered()">📥 Download Package M3U</button>
        </div>
    </div>
</div>

<script>
    let categories = {};
    let fileContent = '';
    
    function processFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        
        document.getElementById('progress').style.display = 'block';
        document.getElementById('progressBar').style.width = '10%';
        document.getElementById('progressBar').innerText = 'Reading file...';
        
        const reader = new FileReader();
        
        reader.onload = function(e) {
            fileContent = e.target.result;
            document.getElementById('progressBar').style.width = '30%';
            document.getElementById('progressBar').innerText = 'Parsing playlist...';
            
            setTimeout(() => {
                parseM3U(fileContent);
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressBar').innerText = 'Complete!';
                setTimeout(() => {
                    document.getElementById('progress').style.display = 'none';
                }, 1000);
                document.getElementById('editor').style.display = 'block';
            }, 100);
        };
        
        reader.onerror = function() {
            alert('Error reading file');
            document.getElementById('progress').style.display = 'none';
        };
        
        reader.readAsText(file);
    }
    
    function parseM3U(data) {
        categories = {};
        const lines = data.split('\n');
        let currentCategory = 'Uncategorized';
        let currentExtinf = '';
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            
            if (line.startsWith('#EXTINF')) {
                currentExtinf = line;
                const groupMatch = line.match(/group-title="([^"]+)"/);
                currentCategory = groupMatch ? groupMatch[1] : 'Uncategorized';
                
                if (!categories[currentCategory]) {
                    categories[currentCategory] = { channels: [], selected: true };
                }
            }
            else if (line.startsWith('http') && currentExtinf) {
                const nameMatch = currentExtinf.match(/,(.+)$/);
                const channelName = nameMatch ? nameMatch[1] : 'Unknown';
                categories[currentCategory].channels.push({ 
                    extinf: currentExtinf, 
                    url: line,
                    name: channelName
                });
                currentExtinf = '';
            }
        }
        
        displayCategories();
        updateStats();
    }
    
    function displayCategories() {
        const container = document.getElementById('categories');
        container.innerHTML = '';
        
        const searchTerm = document.getElementById('searchBox').value.toLowerCase();
        const sortedCategories = Object.keys(categories).sort();
        
        for (const catName of sortedCategories) {
            if (searchTerm && !catName.toLowerCase().includes(searchTerm)) {
                continue;
            }
            const catData = categories[catName];
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            
            catDiv.innerHTML = `
                <label onclick="event.stopPropagation(); toggleCategory('${catName.replace(/'/g, "\\'")}')">
                    <input type="checkbox" id="${safeId}" ${catData.selected ? 'checked' : ''} onclick="event.stopPropagation(); toggleCheckbox('${catName.replace(/'/g, "\\'")}')"> 
                    <strong>📁 ${catName}</strong>
                    <span class="category-count">(${catData.channels.length} channels)</span>
                </label>
                <div class="channels" id="channels_${safeId}">
                    ${catData.channels.slice(0, 50).map(ch => `<div class="channel" title="${ch.name}">▶ ${ch.name.substring(0, 80)}</div>`).join('')}
                    ${catData.channels.length > 50 ? `<div>... and ${catData.channels.length - 50} more</div>` : ''}
                </div>
            `;
            container.appendChild(catDiv);
        }
    }
    
    function filterCategories() {
        displayCategories();
    }
    
    function toggleCheckbox(catName) {
        const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
        const checkbox = document.getElementById(safeId);
        categories[catName].selected = checkbox.checked;
        updateStats();
    }
    
    function toggleCategory(catName) {
        const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
        const checkbox = document.getElementById(safeId);
        checkbox.checked = !checkbox.checked;
        categories[catName].selected = checkbox.checked;
        
        const channelsDiv = document.getElementById('channels_' + safeId);
        if (channelsDiv) {
            channelsDiv.style.display = channelsDiv.style.display === 'none' ? 'block' : 'none';
        }
        
        updateStats();
    }
    
    function updateStats() {
        let total = 0;
        let selected = 0;
        for (const cat of Object.values(categories)) {
            total += cat.channels.length;
            if (cat.selected) selected += cat.channels.length;
        }
        document.getElementById('stats').innerHTML = `📊 Total channels: ${total.toLocaleString()} | ✅ Selected: ${selected.toLocaleString()}`;
    }
    
    function selectAll() {
        for (const catName of Object.keys(categories)) {
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            const checkbox = document.getElementById(safeId);
            if (checkbox) {
                checkbox.checked = true;
                categories[catName].selected = true;
            }
        }
        updateStats();
    }
    
    function deselectAll() {
        for (const catName of Object.keys(categories)) {
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            const checkbox = document.getElementById(safeId);
            if (checkbox) {
                checkbox.checked = false;
                categories[catName].selected = false;
            }
        }
        updateStats();
    }
    
    function expandAll() {
        for (const catName of Object.keys(categories)) {
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            const channelsDiv = document.getElementById('channels_' + safeId);
            if (channelsDiv) channelsDiv.style.display = 'block';
        }
    }
    
    function collapseAll() {
        for (const catName of Object.keys(categories)) {
            const safeId = 'cat_' + btoa(catName).replace(/[^a-zA-Z0-9]/g, '_');
            const channelsDiv = document.getElementById('channels_' + safeId);
            if (channelsDiv) channelsDiv.style.display = 'none';
        }
    }
    
    function downloadFiltered() {
        let output = '#EXTM3U\n';
        let count = 0;
        
        for (const [catName, catData] of Object.entries(categories)) {
            if (catData.selected) {
                for (const channel of catData.channels) {
                    output += channel.extinf + '\n';
                    output += channel.url + '\n';
                    count++;
                }
            }
        }
        
        const blob = new Blob([output], { type: 'text/plain' });
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = 'package_' + new Date().getTime() + '.m3u';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert(`Package created with ${count.toLocaleString()} channels!`);
    }
</script>
</body>
</html>
